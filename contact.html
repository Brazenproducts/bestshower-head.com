<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BestShower-Head.com</title>
    <meta name="description" content="Contact BestShower-Head.com — get in touch with feedback, corrections, or product suggestions for our review team.">
    <link rel="canonical" href="https://bestshower-head.com/contact.html">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">BestShower-Head</a>
            <nav>
                <ul class="nav">
                    <li><a href="/">Home</a></li>
                    <li><a href="best-shower-head-2026.html">Top Picks</a></li>
                    <li><a href="buyers-guide.html">Buyer's Guide</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
            <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Questions, corrections, or a model you'd like us to test? We'd love to hear from you.</p>
        </div>
    </section>

    <main>
        <section class="section">
            <div class="container narrow">
                <form class="contact-form" action="https://formspree.io/f/your-id" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject">
                            <option>General feedback</option>
                            <option>Correction or update</option>
                            <option>Product suggestion</option>
                            <option>Press / partnership inquiry</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/">Home</a>
                <a href="best-shower-head-2026.html">Reviews</a>
                <a href="buyers-guide.html">Buyer's Guide</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <p>© 2026 BestShower-Head.com. All rights reserved.</p>
        </div>
    </footer>

    <script>
    document.querySelector('.mobile-toggle').addEventListener('click', function() {
        document.querySelector('.nav').classList.toggle('active');
    });
    </script>
</body>
</html>
